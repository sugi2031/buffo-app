<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>buffoEgg's App</title>
<link rel="apple-touch-icon" sizes="180x180" href="./buffo_icon_180.png">
<link rel="icon" type="image/png" sizes="180x180" href="./buffo_icon_180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="buffoEgg">
<style>
body{margin:0;background:#F6FAF0;display:flex;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,"Hiragino Maru Gothic Pro",sans-serif;}
.ld{text-align:center;color:#2D6A2D;padding:20px;}
.ld img{border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,0.1);}
.ld .name{font-size:20px;font-weight:800;margin-top:16px;}
.ld .desc{font-size:13px;color:#888;margin-top:6px;}
.ld a{display:inline-block;margin-top:24px;padding:16px 40px;background:#2D6A2D;color:#fff;border-radius:14px;text-decoration:none;font-weight:800;font-size:17px;}
.ld a:active{background:#1A4A1A;}
.ld .hint{font-size:11px;color:#aaa;margin-top:20px;line-height:1.6;}
.ld .loading{font-size:15px;color:#2D6A2D;margin-top:16px;font-weight:700;}
</style>
</head>
<body>
<div class="ld">
  <img src="./buffo_icon_180.png" alt="buffoEgg" width="100" height="100">
  <div class="name">buffoEgg's App</div>
  <div class="desc">ふぁーむbuffo 産卵・給餌管理</div>
  <div id="action">
    <a href="https://script.google.com/macros/s/AKfycbyT3R_54xZOcX1Trb-6ltqVMrgMW0CWgSgm_Co0LSPlZAQFBqQRr96mRlpEJs9S5vTJ/exec">🥚 アプリを開く</a>
    <div class="hint">📌 初回だけ：このページで<br>共有ボタン（□↑）→「ホーム画面に追加」<br>をすると、アイコンからすぐ開けます</div>
  </div>
</div>
<script>
// ホーム画面から起動された場合は自動でアプリに飛ぶ
if (window.navigator.standalone === true) {
  document.getElementById("action").innerHTML = '<div class="loading">アプリを起動中...</div>';
  window.location.href = "https://script.google.com/macros/s/AKfycbyT3R_54xZOcX1Trb-6ltqVMrgMW0CWgSgm_Co0LSPlZAQFBqQRr96mRlpEJs9S5vTJ/exec";
}
</script>
</body>
</html>
